name: Build Android APK

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Compute remote JSON URL
        id: meta
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO="${GITHUB_REPOSITORY#*/}"
          RAW_URL="https://raw.githubusercontent.com/${OWNER}/${REPO}/main/mobile_app/data/latest.json"
          echo "raw_url=${RAW_URL}" >> "${GITHUB_OUTPUT}"

      - name: Sync Android assets
        run: |
          python3 sync_android_assets.py \
            --remote-json-url "${{ steps.meta.outputs.raw_url }}"
        working-directory: .

      - name: Build debug APK
        run: gradle -p android_app assembleDebug

      - name: Prepare APK asset
        run: |
          mkdir -p release_assets
          cp android_app/app/build/outputs/apk/debug/app-debug.apk release_assets/news-assistant-latest.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: news-assistant-debug-apk
          path: release_assets/news-assistant-latest.apk

      - name: Publish rolling latest release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-latest
          name: Latest APK
          body: |
            这个 release 始终保存当前最新的 APK。

            手机网页版：
            https://zzzhhhaaannnggg6.github.io/news-assistant/

            所有历史版本：
            https://github.com/zzzhhhaaannnggg6/news-assistant/releases
          files: release_assets/news-assistant-latest.apk
          prerelease: false
          draft: false

      - name: Attach APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/news-assistant-latest.apk
