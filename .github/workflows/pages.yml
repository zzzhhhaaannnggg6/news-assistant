name: Deploy Mobile Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      site-url: ${{ steps.meta.outputs.site_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute Pages URL
        id: meta
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO="${GITHUB_REPOSITORY#*/}"
          if [ "${REPO}" = "${OWNER}.github.io" ]; then
            SITE_URL="https://${OWNER}.github.io/latest.json"
          else
            SITE_URL="https://${OWNER}.github.io/${REPO}/latest.json"
          fi
          echo "site_url=${SITE_URL}" >> "${GITHUB_OUTPUT}"

      - name: Prepare site bundle
        run: |
          python3 prepare_site_bundle.py \
            --output-dir site_dist \
            --remote-json-url "${{ steps.meta.outputs.site_url }}"
        working-directory: .

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site_dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
